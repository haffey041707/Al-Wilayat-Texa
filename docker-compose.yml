services:
  api:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - WILAYAT_SECRET=change-me-in-prod
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000

  web:
    image: python:3.12-slim
    working_dir: /srv
    volumes:
      - ./web:/srv
    ports:
      - "5500:5500"
    command: python -m http.server 5500
    depends_on:
      - api
